<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商家详情 — OpenToday｜今日开业</title>
<meta name="description" content="OpenToday 商家详情。" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="demo.css" />
<style>
  #bCover{aspect-ratio:21/9;width:100%;border-radius:14px;background:#e7ddd4 center/cover no-repeat;position:relative;overflow:hidden;}
  #bCover .badge{position:absolute;top:14px;left:14px;}
  #bThumbs{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-top:10px;}
  #bThumbs .th{aspect-ratio:4/3;border-radius:10px;background:#eee center/cover no-repeat;cursor:pointer;border:2px solid transparent;}
  #bThumbs .th:hover{border-color:var(--brand);}
  /* Premium 品牌主页 — OpenToday 白底橙色排版 */
  #premiumWrap .brand-logo{background:var(--ink-strong);color:#fff;}
  #premiumWrap .brand-hero-img{background:var(--surface);border:1px solid var(--line);}
  #premiumWrap .gold-line{color:var(--brand);}
  #premiumWrap .gold-accent{border-top-color:var(--brand);}
  #premiumWrap .story-img{background:var(--surface);}
  #premiumWrap .prem-cta{background:var(--brand-soft);border:1px solid rgba(249,115,22,.25);border-radius:18px;padding:40px;text-align:center;}
</style>
</head>
<body>
<div id="site-header"></div>

<main>
  <!-- Premium 品牌主页（Premium Brand Launch 商家自动切换）-->
  <div id="premiumWrap" style="display:none;"></div>

  <!-- 标准商家页（Free / Opening / Launch）-->
  <div class="container" id="standardWrap">
    <div class="crumb"><a href="index.html">首页</a> / <a href="explore.html">探索商家</a> / <span id="bCrumb">商家</span></div>

    <div id="bCover"><span class="badge badge-open">已刊登</span></div>
    <div id="bThumbs"></div>

    <div class="detail">
      <div>
        <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
          <h1 id="bName" style="font-size:32px;">加载中…</h1>
          <span class="badge-inline b-verified">✓ 已刊登</span>
        </div>
        <p class="muted" id="bMeta" style="margin-top:6px;"></p>

        <div id="descSec" style="margin-top:26px;display:none;">
          <h3 style="margin:0 0 10px;">关于</h3>
          <p id="bDesc" style="line-height:1.7;"></p>
        </div>

        <div id="addrSec" style="margin-top:24px;display:none;">
          <h3 style="margin:0 0 10px;">地址</h3>
          <div class="info-row" style="border-top:none;padding-top:0;"><span class="k" style="min-width:52px;">地址</span><span id="bAddr"></span></div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px;">
            <a id="bMapBtn" class="btn btn-outline" style="display:none;" href="#" target="_blank" rel="noopener">🧭 Google 地图</a>
            <a id="bWazeBtn" class="btn btn-outline" style="display:none;" href="#" target="_blank" rel="noopener">🚗 Waze 导航</a>
          </div>
          <iframe id="bMapEmbed" title="Google 地图" style="display:none;width:100%;height:320px;border:0;border-radius:12px;margin-top:14px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
        </div>

        <div id="hoursSec" style="margin-top:26px;display:none;">
          <h3 style="margin:0 0 10px;">营业时间</h3>
          <table class="hours" id="bHours"></table>
        </div>

        <div id="storySec" style="margin-top:26px;display:none;">
          <h3 style="margin:0 0 10px;">品牌故事</h3>
          <p id="bStory" class="muted" style="line-height:1.7;"></p>
        </div>

        <div id="prodSec" style="margin-top:26px;display:none;">
          <h3 style="margin:0 0 12px;">产品与服务</h3>
          <div class="grid g-3" id="bProducts"></div>
        </div>

        <div id="faqSec" style="margin-top:26px;display:none;">
          <h3 style="margin:0 0 12px;">常见问题</h3>
          <div id="bFaq"></div>
        </div>
      </div>

      <aside>
        <div class="contact-card">
          <a class="btn btn-wa" id="bWa" style="display:none;" href="#" target="_blank" rel="noopener">● WhatsApp 联系</a>
          <a class="btn btn-outline" id="bTel" style="display:none;" href="#">📞 电话</a>
          <a class="btn btn-outline" id="bDir" style="display:none;" href="#" target="_blank" rel="noopener">🧭 查看路线</a>
          <div style="border-top:1px solid var(--line);margin:14px 0;"></div>
          <div class="info-row" style="border:none;padding-top:0;"><span class="k">分类</span><span id="ccCat">—</span></div>
          <div class="info-row"><span class="k">地区</span><span id="ccArea">—</span></div>
          <div class="socials" id="bSocials" style="margin-top:10px;"></div>
        </div>
      </aside>
    </div>

    <section id="branchSec" style="display:none;padding-top:8px;">
      <div class="sec-head"><h2>分店</h2></div>
      <div class="grid g-3" id="bBranches"></div>
    </section>
  </div>
</main>

<div id="site-footer"></div>
<script>window.CURRENT_PAGE="explore";</script>
<script src="site.js"></script>
<script>
(function(){
  var SB_URL="https://jumzzfvgkqsfeypbpgcq.supabase.co";
  var SB_KEY="sb_publishable_QspxuW5zHogZs2d3Uyl4lA_LEHGjHSI";
  var id=new URLSearchParams(location.search).get("id");
  var $=function(x){return document.getElementById(x);};
  function show(el){ if(el) el.style.display=""; }
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  function arr(v){ try{ return Array.isArray(v)?v:(v?JSON.parse(v):[]); }catch(e){ return []; } }
  if(!id){ $("bName").textContent="请从探索页选择商家"; return; }
  fetch(SB_URL+"/rest/v1/public_customers?id=eq."+encodeURIComponent(id)+"&select=*",{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!Array.isArray(rows)||!rows.length){ $("bName").textContent="找不到该商家"; return; }
      var b=rows[0];
      if(b.project==="Premium Brand Launch"){ $("standardWrap").style.display="none"; renderPremium(b); }
      else { renderStandard(b); }
    })
    .catch(function(){ $("bName").textContent="加载失败，请稍后重试"; });

  // ────────────── 标准页（Free / Opening / Launch）──────────────
  function renderStandard(b){
      document.title=b.business_name+" — OpenToday｜今日开业";
      $("bCrumb").textContent=b.business_name;
      $("bName").textContent=b.business_name;
      $("bMeta").textContent=[b.category,b.area||b.city].filter(Boolean).join(" · ");
      $("ccCat").textContent=b.category||"—";
      $("ccArea").textContent=b.area||b.city||"—";
      var cover=b.image_url||"";
      var gal=arr(b.gallery);
      if(cover){ $("bCover").style.backgroundImage="url('"+cover+"')"; }
      if(gal.length){
        var t=$("bThumbs"); var all=[cover].concat(gal).filter(Boolean);
        t.innerHTML=all.map(function(u){return '<div class="th" style="background-image:url(\''+u+'\')" data-u="'+u+'"></div>';}).join("");
        t.addEventListener("click",function(e){ var d=e.target.closest(".th"); if(d){ $("bCover").style.backgroundImage="url('"+d.getAttribute("data-u")+"')"; } });
      }
      if(b.short_description){ $("bDesc").textContent=b.short_description; show($("descSec")); }
      if(b.address){
        $("bAddr").textContent=b.address; show($("addrSec"));
        if(b.google_maps_url){ var mb=$("bMapBtn"); mb.href=b.google_maps_url; show(mb); }
        var wz=$("bWazeBtn"); wz.href="https://waze.com/ul?q="+encodeURIComponent(b.address)+"&navigate=yes"; show(wz);
        var mf=$("bMapEmbed"); mf.src="https://maps.google.com/maps?q="+encodeURIComponent(b.address)+"&z=16&output=embed"; show(mf);
      }
      if(b.whatsapp){ var wa=$("bWa"); wa.href="https://wa.me/"+String(b.whatsapp).replace(/[^0-9]/g,""); show(wa); }
      if(b.phone){ var tel=$("bTel"); tel.href="tel:"+String(b.phone).replace(/\s+/g,""); show(tel); }
      if(b.google_maps_url){ var dir=$("bDir"); dir.href=b.google_maps_url; show(dir); }
      var soc=$("bSocials"), h="";
      if(b.facebook_url) h+='<a href="'+b.facebook_url+'" target="_blank" rel="noopener">f</a>';
      if(b.instagram_url) h+='<a href="'+b.instagram_url+'" target="_blank" rel="noopener">◎</a>';
      soc.innerHTML=h;
      if(b.hours){
        $("bHours").innerHTML=String(b.hours).split(/\n/).filter(Boolean).map(function(ln){var p=ln.split("|");return '<tr><td>'+esc((p[0]||"").trim())+'</td><td>'+esc((p[1]||"").trim())+'</td></tr>';}).join("");
        show($("hoursSec"));
      }
      if(b.brand_story){ $("bStory").textContent=b.brand_story; show($("storySec")); }
      var prods=arr(b.products);
      if(prods.length){
        $("bProducts").innerHTML=prods.map(function(p){return '<div class="card" style="padding:16px;"><b>'+esc(p.name||"")+'</b>'+(p.desc?'<p class="muted" style="font-size:13px;margin-top:6px;">'+esc(p.desc)+'</p>':'')+'</div>';}).join("");
        show($("prodSec"));
      }
      var faqs=arr(b.faq);
      if(faqs.length){
        $("bFaq").innerHTML=faqs.map(function(f,i){return '<div class="faq'+(i===0?' open':'')+'"><q>'+esc(f.q||"")+' <span class="pm">+</span></q><div class="a">'+esc(f.a||"")+'</div></div>';}).join("");
        show($("faqSec"));
      }
      var brs=arr(b.branches);
      if(brs.length){
        $("bBranches").innerHTML=brs.map(function(br){var mb=br.maps?'<a class="btn btn-outline" href="'+esc(br.maps)+'" target="_blank" rel="noopener" style="margin-top:10px;">🧭 地图</a>':'';return '<div class="card" style="padding:16px;"><b>'+esc(br.name||"")+'</b><div class="muted" style="font-size:13px;margin-top:4px;">'+esc([br.area,br.address].filter(Boolean).join(" · "))+'</div>'+mb+'</div>';}).join("");
        show($("branchSec"));
      }
  }

  // ────────────── Premium 品牌主页（黑金）──────────────
  function renderPremium(b){
    var wrap=$("premiumWrap"); wrap.style.display="";
    var name=b.business_name||"";
    var initial=(name.trim().charAt(0)||"B").toUpperCase();
    var cover=b.image_url||"";
    var gal=arr(b.gallery), branches=arr(b.branches), prods=arr(b.products), faqs=arr(b.faq);
    var wa=b.whatsapp?("https://wa.me/"+String(b.whatsapp).replace(/[^0-9]/g,"")):"";
    var map=b.google_maps_url||"";
    function firstSentence(s){ if(!s) return ""; var parts=String(s).split(/[。！？\n]/).filter(function(x){return x.trim();}); return parts.length?parts[0].trim()+"。":String(s).trim(); }
    var subbits=[]; if(b.category) subbits.push(b.category); if(branches.length>=2) subbits.push(branches.length+" 家分店");
    var sub=subbits.join(" · ");
    var lead=b.short_description||firstSentence(b.brand_story);
    var heroImg=cover?("background:#eee url('"+cover+"') center/cover;"):"";
    var html="";

    // 品牌主页 Hero
    html+='<section style="padding-bottom:0;"><div class="container">'
      +'<div class="crumb"><a href="index.html">首页</a> / <a href="explore.html">探索商家</a> / <span>'+esc(name)+'</span></div>'
      +'<div class="brand-hero"><div>'
        +'<div class="brand-logo">'+esc(initial)+'</div>'
        +'<span class="eyebrow" style="margin-top:14px;">⭐ PREMIUM · 品牌主页</span>'
        +'<h1 style="margin:12px 0 8px;">'+esc(name)+'</h1>'
        +(sub?'<p class="muted" style="margin:0 0 12px;">'+esc(sub)+'</p>':'')
        +(lead?'<p class="lead">'+esc(lead)+'</p>':'')
        +'<div style="display:flex;gap:10px;margin-top:20px;flex-wrap:wrap;">'
          +(wa?'<a class="btn btn-brand btn-lg" href="'+wa+'" target="_blank" rel="noopener">● WhatsApp</a>':'')
          +(map?'<a class="btn btn-outline btn-lg" href="'+esc(map)+'" target="_blank" rel="noopener">🧭 地图</a>':'')
        +'</div></div>'
        +'<div class="brand-hero-img" style="'+heroImg+'"></div>'
      +'</div></div></section>';

    // 品牌故事
    if(b.brand_story){
      var simg=(gal[0]||cover)?("background:#eee url('"+(gal[0]||cover)+"') center/cover;"):"";
      html+='<section style="padding-top:36px;"><div class="container"><div class="story">'
        +'<div class="story-img" style="'+simg+'"></div>'
        +'<div><span class="eyebrow">品牌故事</span>'
        +'<h2 style="margin:12px 0 10px;">关于我们</h2>'
        +'<p class="muted" style="line-height:1.7;">'+esc(b.brand_story)+'</p></div>'
      +'</div></div></section>';
    }

    // 分店
    if(branches.length){
      html+='<section style="background:var(--surface);"><div class="container"><div class="sec-head"><h2>分店</h2><span class="muted" style="font-size:13px;">'+branches.length+' 家分店，统一品牌管理</span></div><div class="grid g-3">'
        +branches.map(function(br,i){
          var bi=gal.length?("background:#eee url('"+gal[(i+1)%gal.length]+"') center/cover;"):"background:var(--surface);";
          var href=br.maps?esc(br.maps):"#";
          return '<a class="branch gold-accent" href="'+href+'" target="_blank" rel="noopener"><div class="bi" style="'+bi+'"></div><div class="bb"><b>'+esc(br.name||"")+'</b><div class="m">'+esc([br.area,br.address].filter(Boolean).join(" · "))+'</div></div></a>';
        }).join("")
      +'</div></div></section>';
    }

    // 品牌图库
    if(gal.length){
      html+='<section><div class="container"><div class="sec-head"><h2>品牌图库</h2></div><div class="gallery-lg">'
        +gal.slice(0,5).map(function(u,i){return '<div class="'+(i===0?"big":"")+'" style="background-image:url(\''+u+'\')"></div>';}).join("")
      +'</div></div></section>';
    }

    // 产品与服务
    if(prods.length){
      html+='<section><div class="container"><div class="sec-head"><h2>产品与服务</h2></div><div class="grid g-3">'
        +prods.map(function(p){return '<div class="card" style="padding:16px;"><b>'+esc(p.name||"")+'</b>'+(p.desc?'<p class="muted" style="font-size:13px;margin-top:6px;">'+esc(p.desc)+'</p>':'')+'</div>';}).join("")
      +'</div></div></section>';
    }

    // 营业时间 + 地址/地图
    var hoursHtml="", addrHtml="";
    if(b.hours){ hoursHtml='<div><h3 style="margin:0 0 10px;">营业时间</h3><table class="hours">'+String(b.hours).split(/\n/).filter(Boolean).map(function(ln){var p=ln.split("|");return '<tr><td>'+esc((p[0]||"").trim())+'</td><td>'+esc((p[1]||"").trim())+'</td></tr>';}).join("")+'</table></div>'; }
    if(b.address){ addrHtml='<div><h3 style="margin:0 0 10px;">地址</h3><p class="muted" style="line-height:1.7;">'+esc(b.address)+'</p><iframe title="地图" style="width:100%;height:260px;border:0;border-radius:12px;margin-top:10px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q='+encodeURIComponent(b.address)+'&z=16&output=embed"></iframe></div>'; }
    if(hoursHtml||addrHtml){ html+='<section><div class="container"><div class="grid" style="grid-template-columns:1fr 1fr;gap:32px;">'+hoursHtml+addrHtml+'</div></div></section>'; }

    // 常见问题
    if(faqs.length){
      html+='<section><div class="container"><div class="sec-head"><h2>常见问题</h2></div><div>'
        +faqs.map(function(f,i){return '<div class="faq'+(i===0?" open":"")+'"><q>'+esc(f.q||"")+' <span class="pm">+</span></q><div class="a">'+esc(f.a||"")+'</div></div>';}).join("")
      +'</div></div></section>';
    }

    // 品牌 CTA
    html+='<section style="padding-top:0;"><div class="container"><div class="prem-cta">'
      +'<h2>'+esc(name)+'</h2>'
      +'<p class="muted" style="margin:10px 0 20px;">Premium 品牌主页 · OpenToday｜今日开业</p>'
      +(wa?'<a class="btn btn-brand btn-lg" href="'+wa+'" target="_blank" rel="noopener">● 联系我们</a>':'')
    +'</div></div></section>';

    wrap.innerHTML=html;
    document.title=name+" — OpenToday｜今日开业";
  }
})();
</script>
</body>
</html>
