<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>商家详情 — OpenToday｜今日开业</title>
<meta name="description" content="OpenToday 商家详情。" />
<link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="demo.css" />
<style>
  /* Premium 品牌区块 — OpenToday 白底橙色 */
  #page .brand-logo{background:var(--ink-strong);color:#fff;}
  #page .brand-hero-img{background:var(--surface);border:1px solid var(--line);}
  #page .branch.gold-accent{border-top-color:var(--brand);}
  #page #bThumbs .th:hover{border-color:var(--brand)!important;}
</style>
</head>
<body>
<div id="site-header"></div>

<main>
  <div class="container" id="page"><p class="muted" style="padding:40px 0;">加载中…</p></div>
</main>

<div id="site-footer"></div>
<script>window.CURRENT_PAGE="explore";</script>
<script src="site.js"></script>
<script>
(function(){
  var SB_URL="https://jumzzfvgkqsfeypbpgcq.supabase.co";
  var SB_KEY="sb_publishable_QspxuW5zHogZs2d3Uyl4lA_LEHGjHSI";
  var id=new URLSearchParams(location.search).get("id");
  var $=function(x){return document.getElementById(x);};
  function esc(s){return (s==null?"":String(s)).replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;"}[c];});}
  function arr(v){ try{ return Array.isArray(v)?v:(v?JSON.parse(v):[]); }catch(e){ return []; } }
  function teaser(s,n){ s=String(s||"").replace(/\s+/g," ").trim(); return s.length>n?s.slice(0,n).trim()+"…":s; }
  function fmtDate(d){ var m=String(d||"").match(/^(\d{4})-(\d{2})-(\d{2})/); return m?parseInt(m[2],10)+"月"+parseInt(m[3],10)+"日开业":""; }

  document.getElementById("page").addEventListener("click",function(e){ var d=e.target.closest(".th"); if(d){ var c=document.getElementById("bCover"); if(c && c.tagName==="IMG"){ c.src=d.getAttribute("data-u"); } else if(c){ c.style.backgroundImage="url('"+d.getAttribute("data-u")+"')"; } } });
  if(!id){ $("page").innerHTML='<p class="muted" style="padding:40px 0;">请从探索页选择商家。</p>'; return; }
  fetch(SB_URL+"/rest/v1/public_customers?id=eq."+encodeURIComponent(id)+"&select=*",{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!Array.isArray(rows)||!rows.length){ $("page").innerHTML='<p class="muted" style="padding:40px 0;">找不到该商家。</p>'; return; }
      render(rows[0]);
    })
    .catch(function(){ $("page").innerHTML='<p class="muted" style="padding:40px 0;">加载失败，请稍后重试。</p>'; });

  function render(b){
    var name=b.business_name||"";
    var initial=(name.trim().charAt(0)||"O").toUpperCase();
    var cover=b.image_url||"";
    var logo="";
    var gal=arr(b.gallery), prods=arr(b.products), faqs=arr(b.faq), branches=arr(b.branches);
    var TIER={"Free Listing":0,"Opening Profile":1,"Launch Boost":2,"Premium Brand Launch":3};
    var rank=TIER[b.project]||0;
    var premium=rank>=3;
    logo=(rank>=1 && b.logo_url)?b.logo_url:"";
    var today=new Date().toISOString().slice(0,10);
    var isFeat=!!b.featured && (!b.featured_start||String(b.featured_start)<=today) && (!b.featured_until||String(b.featured_until)>=today);
    var wa=b.whatsapp?("https://wa.me/"+String(b.whatsapp).replace(/[^0-9]/g,"")):"";
    var tel=b.phone?("tel:"+String(b.phone).replace(/\s+/g,"")):"";
    var map=b.google_maps_url||"";
    var waze=b.address?("https://waze.com/ul?q="+encodeURIComponent(b.address)+"&navigate=yes"):"";
    var metaStr=[b.category,b.area||b.city,fmtDate(b.opening_date)].filter(Boolean).join(" · ");

    document.title=name+" — OpenToday｜今日开业";
    var html='<div class="crumb"><a href="index.html">首页</a> / <a href="explore.html">探索商家</a> / <span>'+esc(name)+'</span></div>';

    // ── Premium 品牌 Banner ──
    if(premium){
      var subbits=[]; if(b.category) subbits.push(b.category); if(branches.length>=2) subbits.push(branches.length+" 家分店");
      var slogan=(b.slogan||"").trim();
      var lead=teaser(b.short_description||b.brand_story,54);
      var heroImg=cover?("background:#eee url('"+esc(cover)+"') center/cover;"):"";
      var blogo=logo?'<div class="brand-logo" style="background:#fff center/contain no-repeat;background-image:url(\''+esc(logo)+'\');border:1px solid var(--line);"></div>':'<div class="brand-logo">'+esc(initial)+'</div>';
      html+='<div class="brand-hero" style="padding:6px 0 22px;"><div>'
        +blogo
        +'<span class="eyebrow" style="margin-top:12px;">⭐ PREMIUM · 品牌主页</span>'
        +'<h1 style="margin:10px 0 6px;">'+esc(name)+'</h1>'
        +(subbits.length?'<p class="muted" style="margin:0 0 10px;">'+esc(subbits.join(" · "))+'</p>':'')
        +(slogan?'<p style="font-size:21px;font-weight:600;line-height:1.4;color:var(--ink);margin:2px 0 8px;">'+esc(slogan)+'</p>':(lead?'<p class="lead">'+esc(lead)+'</p>':''))
        +'<div style="display:flex;gap:10px;margin-top:16px;flex-wrap:wrap;">'
          +(wa?'<a class="btn btn-brand btn-lg" href="'+wa+'" target="_blank" rel="noopener">● WhatsApp</a>':'')
          +(map?'<a class="btn btn-outline btn-lg" href="'+esc(map)+'" target="_blank" rel="noopener">🧭 地图</a>':'')
        +'</div></div><div class="brand-hero-img" style="'+heroImg+'"></div></div>';
    }

    // ── 大封面 + 可点缩略图 ──
    var imgs=(premium?gal:[cover].concat(gal)).filter(Boolean);
    var seen={}, uimgs=[]; imgs.forEach(function(u){ if(!seen[u]){ seen[u]=1; uimgs.push(u); } });
    var mainImg=uimgs[0]||cover||"";
    if(mainImg){
      html+='<div style="text-align:center;background:#f7f5f2;border-radius:14px;"><img id="bCover" alt="'+esc(name)+'" src="'+esc(mainImg)+'" style="display:block;width:auto;max-width:100%;max-height:560px;margin:0 auto;border-radius:14px;" /></div>';
    } else {
      html+='<div id="bCover" style="aspect-ratio:21/9;width:100%;border-radius:14px;background:#e7ddd4;"></div>';
    }
    if(uimgs.length>1){
      html+='<div id="bThumbs" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(110px,1fr));gap:8px;margin-top:10px;">'
        +uimgs.map(function(u){return '<div class="th" data-u="'+esc(u)+'" style="aspect-ratio:4/3;border-radius:10px;background:#eee center/cover no-repeat;background-image:url(\''+esc(u)+'\');cursor:pointer;border:2px solid transparent;"></div>';}).join("")
        +'</div>';
    }

    // ── Detail 双栏 ──
    html+='<div class="detail"><div>';
    if(!premium){
      var badges='<span class="badge-inline b-verified">✓ 已刊登</span>';
      if(isFeat) badges+=' <span class="badge-inline b-featured">★ 精选</span>';
      var nameLogo=logo?'<img src="'+esc(logo)+'" alt="" style="width:46px;height:46px;border-radius:10px;object-fit:cover;border:1px solid var(--line);flex:0 0 auto;" />':'';
      html+='<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">'+nameLogo+'<h1 style="font-size:32px;margin:0;">'+esc(name)+'</h1>'+badges+'</div>';
      if(metaStr) html+='<p class="muted" style="margin-top:6px;">'+esc(metaStr)+'</p>';
    } else if(metaStr){
      html+='<p class="muted" style="margin:0 0 4px;">'+esc(metaStr)+'</p>';
    }

    // Tabs
    var aboutPane='';
    if(b.short_description) aboutPane+='<p style="margin-bottom:16px;line-height:1.7;">'+esc(b.short_description)+'</p>';
    if(b.hours) aboutPane+='<table class="hours">'+String(b.hours).split(/\n/).filter(Boolean).map(function(ln){var p=ln.split("|");return '<tr><td>'+esc((p[0]||"").trim())+'</td><td>'+esc((p[1]||"").trim())+'</td></tr>';}).join("")+'</table>';
    if(b.address){ aboutPane+='<div style="margin-top:16px;"><div class="info-row" style="border-top:none;padding-top:0;"><span class="k" style="min-width:52px;">地址</span><span>'+esc(b.address)+'</span></div>'
      +'<iframe title="地图" style="width:100%;height:300px;border:0;border-radius:12px;margin-top:12px;" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://maps.google.com/maps?q='+encodeURIComponent(b.address)+'&z=16&output=embed"></iframe></div>'; }
    if(!aboutPane) aboutPane='<p class="muted">暂无更多资料。</p>';

    var tabsArr=[{id:"p-about",label:"关于我们",pane:aboutPane}];
    if(prods.length) tabsArr.push({id:"p-products",label:"产品与服务",pane:'<div class="grid g-3" style="margin-top:4px;">'+prods.map(function(p){return '<div class="card" style="padding:16px;"><b>'+esc(p.name||"")+'</b>'+(p.desc?'<p class="muted" style="font-size:13px;margin-top:6px;">'+esc(p.desc)+'</p>':'')+'</div>';}).join("")+'</div>'});
    if(faqs.length) tabsArr.push({id:"p-faq",label:"常见问题",pane:faqs.map(function(f,i){return '<div class="faq'+(i===0?" open":"")+'"><q>'+esc(f.q||"")+' <span class="pm">+</span></q><div class="a">'+esc(f.a||"")+'</div></div>';}).join("")});

    html+='<div data-tabs style="margin-top:16px;"><div class="tabs">'
      +tabsArr.map(function(t,i){return '<div class="tab'+(i===0?" active":"")+'" data-target="'+t.id+'">'+t.label+'</div>';}).join("")
      +'</div>'
      +tabsArr.map(function(t,i){return '<div class="tabpane'+(i===0?" active":"")+'" id="'+t.id+'">'+t.pane+'</div>';}).join("")
      +'</div>';

    // 品牌故事（Launch/Premium）
    if(b.brand_story && rank>=2){
      html+='<div style="margin-top:32px;"><span class="eyebrow">品牌故事</span>'
        +'<h2 style="margin:12px 0 10px;font-size:23px;">我们的故事</h2>'
        +'<p class="muted" style="line-height:1.8;">'+esc(b.brand_story)+'</p></div>';
    }

    html+='</div>'; // end main col

    // Aside 联系卡
    html+='<aside><div class="contact-card" style="position:sticky;top:20px;">';
    if(wa) html+='<a class="btn btn-wa" href="'+wa+'" target="_blank" rel="noopener">● WhatsApp 联系</a>';
    if(tel) html+='<a class="btn btn-outline" href="'+tel+'">📞 电话</a>';
    if(map) html+='<a class="btn btn-outline" href="'+esc(map)+'" target="_blank" rel="noopener">🧭 查看路线</a>';
    if(waze) html+='<a class="btn btn-outline" href="'+waze+'" target="_blank" rel="noopener">🚗 Waze 导航</a>';
    html+='<div style="border-top:1px solid var(--line);margin:14px 0;"></div>';
    html+='<div class="info-row" style="border:none;padding-top:0;"><span class="k">分类</span><span>'+esc(b.category||"—")+'</span></div>';
    html+='<div class="info-row"><span class="k">地区</span><span>'+esc(b.area||b.city||"—")+'</span></div>';
    var FB='<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M13 22v-8h2.7l.4-3H13V9c0-.9.3-1.5 1.6-1.5H16V4.9c-.3 0-1.2-.1-2.3-.1-2.3 0-3.7 1.4-3.7 3.9V11H7v3h3v8h3z"/></svg>';
    var IG='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="1.2" fill="currentColor" stroke="none"/></svg>';
    var GG='<svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.6 2.6 30.1 0 24 0 14.6 0 6.4 5.4 2.5 13.3l7.9 6.1C12.3 13.2 17.6 9.5 24 9.5z"/><path fill="#4285F4" d="M46.1 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.4c-.5 2.9-2.1 5.3-4.6 6.9l7.1 5.5C43.9 37.4 46.1 31.4 46.1 24.5z"/><path fill="#FBBC05" d="M10.4 28.6c-.5-1.5-.8-3-.8-4.6s.3-3.1.8-4.6l-7.9-6.1C.9 16.5 0 20.1 0 24s.9 7.5 2.5 10.7l7.9-6.1z"/><path fill="#34A853" d="M24 48c6.1 0 11.3-2 15-5.5l-7.1-5.5c-2 1.3-4.6 2.1-7.9 2.1-6.4 0-11.7-3.7-13.6-8.9l-7.9 6.1C6.4 42.6 14.6 48 24 48z"/></svg>';
    var WEB='<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="9"/><path d="M3 12h18"/><path d="M12 3c2.6 2.8 2.6 15.2 0 18M12 3c-2.6 2.8-2.6 15.2 0 18"/></svg>';
    function socIcon(href,style,inner,label){ return '<a href="'+esc(href)+'" target="_blank" rel="noopener" title="'+label+'" style="width:46px;height:46px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;text-decoration:none;flex:0 0 auto;'+style+'">'+inner+'</a>'; }
    var soc='';
    if(b.facebook_url) soc+=socIcon(b.facebook_url,'background:#1877F2;color:#fff;',FB,'Facebook');
    if(b.instagram_url) soc+=socIcon(b.instagram_url,'background:radial-gradient(circle at 30% 107%,#fdf497,#fd5949 45%,#d6249f 60%,#285AEB 90%);color:#fff;',IG,'Instagram');
    if(b.google_review_url) soc+=socIcon(b.google_review_url,'background:#fff;border:1px solid var(--line);',GG,'Google 评价');
    if(b.website_url) soc+=socIcon(b.website_url,'background:var(--ink-strong);color:#fff;',WEB,'官网');
    if(soc) html+='<div style="display:flex;gap:10px;margin-top:14px;flex-wrap:wrap;">'+soc+'</div>';
    html+='</div></aside>';

    html+='</div>'; // end detail

    // 分店（Premium）
    if(branches.length){
      html+='<section style="padding-top:8px;"><div class="sec-head"><h2>分店</h2><span class="muted" style="font-size:13px;">'+branches.length+' 家分店，统一品牌管理</span></div><div class="grid g-3">'
        +branches.map(function(br,i){
          var bi=gal.length?("background:#eee url('"+esc(gal[(i+1)%gal.length])+"') center/cover;"):"background:var(--surface);";
          var href=br.maps?esc(br.maps):"#";
          return '<a class="branch gold-accent" href="'+href+'" target="_blank" rel="noopener"><div class="bi" style="'+bi+'"></div><div class="bb"><b>'+esc(br.name||"")+'</b><div class="m">'+esc([br.area,br.address].filter(Boolean).join(" · "))+'</div></div></a>';
        }).join("")
      +'</div></section>';
    }

    $("page").innerHTML=html;
  }
})();
</script>
</body>
</html>
