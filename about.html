<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>关于我们 — OpenToday｜今日开业</title>
<meta name="description" content="每一家新店，都值得拥有被发现的机会。OpenToday 因此而诞生。" />
<link rel="stylesheet" href="style.css" />
<style>
  .about-hero{padding:96px 0 72px;}
  .about-lead{font-size:19px;line-height:2.1;color:var(--muted);max-width:640px;margin:24px auto 0;}
  .about-statement{margin-top:48px;font-size:40px;line-height:1.35;font-weight:800;color:var(--ink-strong);letter-spacing:-.01em;}
  .vals{display:grid;grid-template-columns:repeat(4,1fr);gap:32px;text-align:center;}
  .val .ic{width:56px;height:56px;border-radius:16px;background:var(--brand-soft);color:var(--brand);display:flex;align-items:center;justify-content:center;margin:0 auto 14px;}
  .val h3{font-size:16px;}
  .val p{font-size:13px;color:var(--muted);margin-top:6px;line-height:1.7;}
  @media(max-width:860px){
    .about-hero{padding:64px 0 48px;}
    .about-statement{font-size:30px;}
    .vals{grid-template-columns:1fr 1fr;gap:36px 24px;}
  }
</style>
</head>
<body>
<div id="site-header"></div>

<main>
  <!-- 开篇 -->
  <section class="about-hero">
    <div class="container" style="text-align:center;">
      <span class="eyebrow">关于我们</span>
      <p class="about-lead">
        每一天，都有新的商家开始营业。<br>
        有些被很多人看见，有些却很快被遗忘。<br>
        我们相信，每一家新店，都值得拥有被发现的机会。<br>
        OpenToday 因此而诞生。
      </p>
      <h1 class="about-statement">开业，是一天。<br><span class="brand">被发现，是每天。</span></h1>
    </div>
  </section>

  <!-- 四个价值 -->
  <section style="background:var(--surface);">
    <div class="container">
      <div class="vals">
        <div class="val"><div class="ic"><i data-lucide="map-pin" style="width:24px;height:24px;"></i></div><h3>长期存在</h3><p>永久保留，不会像贴文一样过期消失。</p></div>
        <div class="val"><div class="ic"><i data-lucide="cpu" style="width:24px;height:24px;"></i></div><h3>AI Ready</h3><p>结构化资料，让 AI 更容易读懂你的店。</p></div>
        <div class="val"><div class="ic"><i data-lucide="search" style="width:24px;height:24px;"></i></div><h3>Google Friendly</h3><p>清晰页面结构，利于 Google 收录。</p></div>
        <div class="val"><div class="ic"><i data-lucide="refresh-cw" style="width:24px;height:24px;"></i></div><h3>持续更新</h3><p>资料随时更新，顾客看到的永远最新。</p></div>
      </div>
    </div>
  </section>

  <!-- 真实数据（低调可信） -->
  <section style="padding:48px 0 0;">
    <div class="container" style="text-align:center;">
      <p class="muted" id="proofLine" style="font-size:15px;">每日更新 · 专注 Johor</p>
    </div>
  </section>

  <!-- CTA -->
  <section style="padding:44px 0 96px;">
    <div class="container" style="text-align:center;">
      <h2>让更多人发现你的店</h2>
      <p class="muted" style="margin:12px 0 26px;">从免费提交开始。</p>
      <a class="btn btn-brand btn-lg" href="submit.html">立即提交商家</a>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script>window.CURRENT_PAGE="about";</script>
<script src="site.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<script>lucide.createIcons();</script>
<script>
(function(){
  var SB_URL="https://jumzzfvgkqsfeypbpgcq.supabase.co";
  var SB_KEY="sb_publishable_QspxuW5zHogZs2d3Uyl4lA_LEHGjHSI";
  fetch(SB_URL+"/rest/v1/public_customers?select=id,area,city",{headers:{apikey:SB_KEY,Authorization:"Bearer "+SB_KEY}})
    .then(function(r){return r.json();})
    .then(function(rows){
      if(!Array.isArray(rows)||!rows.length) return;
      var areas={}; rows.forEach(function(b){ var a=b.area||b.city; if(a) areas[a]=1; });
      var el=document.getElementById("proofLine");
      if(el) el.textContent="已收录 "+rows.length+" 家商家 · 覆盖 "+Object.keys(areas).length+" 个地区 · 每日更新";
    }).catch(function(){});
})();
</script>
</body>
</html>
